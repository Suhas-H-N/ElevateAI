{% extends "base.html" %}

{% block title %}Interview - Elevate AI{% endblock %}

{% block content %}

<div class="interview-container">

    <div class="interview-card">
        <h2>🤖 AI Interview Question</h2>
        <p class="question-progress">Question {{ current }} / {{ total }}</p>
        <div class="question-box">
            {{ question }}
        </div>

        <form method="POST">
            <textarea name="answer" rows="5" placeholder="Type your answer here..." required></textarea>

            <button type="submit" class="next-btn">Next Question →</button>
        </form>

        <a href="/dashboard" class="back-link">← Back to Dashboard</a>
    </div>

</div>

{% endblock %}
