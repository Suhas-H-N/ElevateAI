<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview - Elevate AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar">
    <div class="nav-left">🚀 Elevate AI</div>

    <div class="nav-right">
        <!-- links -->
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    </div>
</nav>

<!-- ===== INTERVIEW CONTAINER ===== -->
<div class="interview-container">

    <div class="interview-card">
        <h2>🤖 AI Interview Question</h2>

        <div class="question-box">
            {{ question }}
        </div>

        <form method="POST">
            <textarea name="answer" rows="5" placeholder="Type your answer here..." required></textarea>

            <button type="submit" class="next-btn">Next Question →</button>
        </form>

        <a href="/dashboard" class="back-link">← Back to Dashboard</a>
    </div>

</div>

<script>
function toggleTheme() {
    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {
        localStorage.setItem("theme", "dark");
    } else {
        localStorage.setItem("theme", "light");
    }
}

window.onload = function () {
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
    }
};
</script>

</body>
</html>
