<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevate AI | Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">🌙</button>

<div class="container">
    <h1 style="margin-bottom:5px;">Elevate AI</h1>
    <p style="margin-top:0; color:gray; font-size:14px;">
        Smart Interview Preparation Platform
    </p>

    <h2 style="margin-top:20px;">Login to your account</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Enter username" required>
        <input type="password" name="password" placeholder="Enter password" required>
        <button type="submit">Login</button>
    </form>

    <p style="margin-top:18px; font-size:14px;">
        New here?
        <a href="/signup"><b>Create an account</b></a>
    </p>
</div>

<script>
function toggleTheme() {
    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {
        localStorage.setItem("theme", "dark");
    } else {
        localStorage.setItem("theme", "light");
    }
}

// Load saved theme
window.onload = function () {
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
    }
};
</script>

</body>
</html>
