<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Elevate AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar">
    <div class="nav-left">🚀 Elevate AI</div>

    <div class="nav-right">
        <!-- links -->
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    </div>
</nav>

<!-- ===== DASHBOARD ===== -->
<div class="dashboard-container">

    <h2 class="dashboard-title">Welcome back, {{ username }} 👋</h2>

    <!-- ===== SCORES ===== -->
    <div class="card">
        <h3>Your Past Interview Scores</h3>

        {% if results %}
            <div class="score-list">
                {% for r in results %}
                    <div class="score-item">
                        <span>Score</span>
                        <strong>{{ r.score }} / {{ r.total }}</strong>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <p class="empty-text">No interview attempts yet.</p>
        {% endif %}
    </div>

    <!-- ===== INTERVIEW TYPES ===== -->
    <div class="card">
        <h3>Choose Interview Type</h3>

        <div class="interview-grid">
            <a href="/interview?category=hr" class="interview-btn">🧑‍💼 HR Interview</a>
            <a href="/interview?category=technical" class="interview-btn">💻 Technical</a>
            <a href="/interview?category=communication" class="interview-btn">🗣 Communication</a>
        </div>
    </div>

</div>

<script>
function toggleTheme() {
    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {
        localStorage.setItem("theme", "dark");
    } else {
        localStorage.setItem("theme", "light");
    }
}

window.onload = function () {
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
    }
};
</script>

</body>
</html>
